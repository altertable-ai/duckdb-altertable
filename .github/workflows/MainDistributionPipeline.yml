#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.2
    with:
      duckdb_version: v1.5.2
      ci_tools_version: v1.5.2
      extension_name: altertable
      # Arrow Flight pulls in Thrift; vcpkg's thrift port needs bison > 2.5 (brew on macOS, yum in Linux images).
      extra_toolchains: 'parser_tools'
      # Extension relies on vcpkg deps that are not supported for WASM builds.
      exclude_archs: 'wasm_mvp;wasm_eh;wasm_threads'

  code-quality-check:
    name: Code Quality Check
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_code_quality.yml@v1.5.2
    with:
      duckdb_version: v1.5.2
      ci_tools_version: v1.5.2
      extension_name: altertable
      # clang-tidy needs vcpkg (Arrow); the reusable workflow does not set up vcpkg — see extension-tidy-check.
      format_checks: "format"

  extension-tidy-check:
    name: Tidy Check
    runs-on: ubuntu-24.04
    env:
      CC: gcc
      CXX: g++
      GEN: ninja
      TIDY_THREADS: 4
      VCPKG_TOOLCHAIN_PATH: ${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
      VCPKG_TARGET_TRIPLET: x64-linux
      VCPKG_OVERLAY_PORTS: ${{ github.workspace }}/extension-ci-tools/vcpkg_ports
      VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/extension-ci-tools/toolchains
      VCPKG_BINARY_SOURCES: "clear;http,https://vcpkg-cache.duckdb.org,read"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install build tools
        run: sudo apt-get update -y -qq && sudo apt-get install -y -qq ninja-build clang-tidy && sudo pip3 install pybind11[global] --break-system-packages

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.1
        with:
          vcpkgGitCommitId: 84bab45d415d22042bd0b9081aea57f362da3f35

      - name: clang-tidy
        run: make tidy-check
